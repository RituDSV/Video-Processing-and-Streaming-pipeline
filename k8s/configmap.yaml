apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: video-platform
data:
  PORT: "3000"
  API_URL: "http://api-service:3000"
  PUBLIC_API_URL: "http://api-service:3000"
  KAFKA_BROKERS: "kafka-service:9092"
  REDIS_URL: "redis://redis-service:6379"
  DATABASE_URL: "postgresql://app:app@postgres-service:5432/video"
  PROCESSED_DIR: "/app/processed"